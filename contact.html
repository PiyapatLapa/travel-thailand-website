<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Travel Thailand</title>
<style>
body {
  font-family: sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 600px;
  margin: 80px auto 40px;
  padding: 20px;
  background: #1e293b;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

h1 {
  color: #38bdf8;
  text-align: center;
  margin-bottom: 20px;
}

form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input, textarea {
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  width: 100%;
  resize: none;
}

textarea {
  height: 120px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #38bdf8;
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #22c55e;
}

a {
  display: block;
  text-align: center;
  margin-top: 20px;
  color: #38bdf8;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

/* Responsive */
@media (max-width: 640px) {
  .container {
    margin: 60px 20px;
    padding: 15px;
  }
}
</style>
</head>
<body>

<div class="container">
<h1>ติดต่อเรา</h1>

<form action="mailto:your-email@example.com" method="post" enctype="text/plain">
  <input type="text" name="name" placeholder="ชื่อของคุณ" required>
  <input type="email" name="email" placeholder="อีเมลของคุณ" required>
  <textarea name="message" placeholder="ข้อความ" required></textarea>
  <button type="submit">ส่งข้อความ</button>
</form>

<a href="index.html">⬅ กลับหน้าแรก</a>
</div>

</body>
</html>

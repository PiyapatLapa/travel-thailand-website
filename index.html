<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Thailand</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background: #0f172a;
  color: white; /* สีฟอนต์หลักของหน้า */
  padding-top: 80px;
}

nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: #020617;
  padding: 15px;
  text-align: center;
  z-index: 100;
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

nav a:hover {
  color: #38bdf8;
}

section {
  padding: 60px 20px;
  text-align: center;
}

h2 {
  margin-bottom: 30px;
  font-size: 2rem;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
}

/* ส่วนที่แก้: ทำให้ลิงก์ที่ครอบการ์ดเป็นสีขาวและไม่มีเส้นใต้ */
.cards a {
  text-decoration: none;
  color: white; 
}

.card {
  background: #1e293b;
  padding: 15px;
  width: 220px;
  border-radius: 12px;
  transition: 0.3s;
  border: 1px solid #334155;
}

.card:hover {
  transform: translateY(-10px);
  border-color: #38bdf8;
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 10px;
}

.card h3 {
  font-size: 1.1rem;
  margin-top: 5px;
}

/* Contact Form */
.contact-container {
  max-width: 600px;
  margin: 40px auto;
  padding: 30px;
  background: #1e293b;
  border-radius: 15px;
}

.contact-container h2 {
  color: #38bdf8;
  margin-bottom: 20px;
}

.contact-container form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* แก้ให้ตัวหนังสือที่พิมพ์ในฟอร์มเป็นสีขาว */
.contact-container input,
.contact-container textarea {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #334155;
  font-size: 16px;
  width: 100%;
  background: #0f172a;
  color: white; 
  outline: none;
}

.contact-container input:focus,
.contact-container textarea:focus {
  border-color: #38bdf8;
}

.contact-container button {
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #38bdf8;
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.contact-container button:hover {
  background: #22c55e;
}

/* Responsive */
@media (max-width: 640px) {
  .contact-container {
    margin: 20px;
    padding: 15px;
  }
}
</style>

</head>
